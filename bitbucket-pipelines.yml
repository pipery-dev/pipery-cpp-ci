# ============================================================================
# Bitbucket Pipelines Configuration for pipery-cpp-ci
# Production-Ready C/C++ CI Pipeline
# ============================================================================
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to pipery-cpp-ci repository root as bitbucket-pipelines.yml
# 2. Configure Protected Variables in Bitbucket
# 3. Set SKIP_* variables to 'true' to disable specific stages
#
# PROTECTED VARIABLES TO CONFIGURE:
# - GITHUB_TOKEN: GitHub API token for reintegration (Mark as Secured)

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository checked out by Bitbucket Pipelines"
          - ls -la

    - step: &setup-step
        name: Setup C/C++ Environment
        image: gcc:latest
        script:
          - echo "Setting up C/C++ CI environment..."
          - gcc --version
          - g++ --version
          - cmake --version || echo "cmake not installed"
          - apt-get update && apt-get install -y cmake make
          - echo "Setup complete"

    - step: &sast-scan
        name: SAST Security Scan
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-sast.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_CONFIG_FILE: ${CONFIG_FILE:-.pipery/config.yaml}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &sca-scan
        name: SCA Dependency Scan
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-sca.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_CONFIG_FILE: ${CONFIG_FILE:-.pipery/config.yaml}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &lint-step
        name: Code Quality Linting
        image: gcc:latest
        script:
          - bash ./src/step-lint.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &build-step
        name: Build C/C++ Project
        image: gcc:latest
        script:
          - bash ./src/step-build.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - build/**

    - step: &test-step
        name: Execute Unit Tests
        image: gcc:latest
        script:
          - bash ./src/step-test.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - build/Testing/**

    - step: &versioning-step
        name: Version Bump & Tag
        image: gcc:latest
        script:
          - bash ./src/step-version.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_VERSION_BUMP: ${VERSION_BUMP:-patch}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - version_info.txt
          - ${LOG_FILE:-pipery.jsonl}

    - step: &packaging-step
        name: Package Artifacts
        image: gcc:latest
        script:
          - bash ./src/step-package.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - build/artifacts.tar.gz

    - step: &release-step
        name: Release Artifacts
        image: alpine:latest
        trigger: manual
        script:
          - bash ./src/step-release.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &reintegration-step
        name: Reintegration to Target Branch
        image: alpine:latest
        trigger: manual
        script:
          - bash ./src/step-reintegrate.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
          INPUT_TARGET_BRANCH: ${TARGET_BRANCH:-main}
          GITHUB_TOKEN: ${GITHUB_TOKEN:-}

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Collecting logs and artifacts..."
          - |
            if [ -f "${LOG_FILE:-pipery.jsonl}" ]; then
              echo "Log file size: $(wc -c < ${LOG_FILE:-pipery.jsonl}) bytes"
            fi
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}
          - version_info.txt

variables:
  # Build Configuration
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  BUILD_SYSTEM: "auto"  # auto, cmake, make, meson
  COMPILER: "g++"
  CMAKE_FLAGS: ""

  # Feature Flags
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"

  # Release Configuration
  VERSION_BUMP: "patch"

  # Logging & Tracking
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - parallel:
        - step: *sast-scan
        - step: *sca-scan
    - step:
        <<: *lint-step
        condition:
          variable:
            - SKIP_LINT = "false"
        optional: true
    - step:
        <<: *build-step
        condition:
          variable:
            - SKIP_BUILD = "false"
    - step:
        <<: *test-step
        condition:
          variable:
            - SKIP_TEST = "false"
        optional: true
    - step:
        <<: *versioning-step
        condition:
          variable:
            - SKIP_VERSIONING = "false"
    - step:
        <<: *packaging-step
        condition:
          variable:
            - SKIP_PACKAGING = "false"
    - step: *logs-step

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *packaging-step
          condition:
            variable:
              - SKIP_PACKAGING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step: *logs-step

  custom:
    release:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *packaging-step
          condition:
            variable:
              - SKIP_PACKAGING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step
