# ============================================================================
# Bitbucket Pipelines Configuration for pipery-cpp-ci
# Production-Ready C/C++ CI Pipeline
# ============================================================================
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to pipery-cpp-ci repository root as bitbucket-pipelines.yml
# 2. Configure Protected Variables in Bitbucket
# 3. Set SKIP_* variables to 'true' to disable specific stages
#
# PROTECTED VARIABLES TO CONFIGURE:
# - GITHUB_TOKEN: GitHub API token for reintegration (Mark as Secured)

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository checked out by Bitbucket Pipelines"
          - ls -la

    - step: &setup-step
        name: Setup C/C++ Environment
        image: gcc:latest
        script:
          - echo "Setting up C/C++ CI environment..."
          - gcc --version
          - g++ --version
          - cmake --version || echo "cmake not installed"
          - apt-get update && apt-get install -y cmake make
          - echo "Setup complete"

    - step: &sast-scan
        name: SAST Security Scan
        image: gcc:latest
        script:
          - echo "Running SAST scan using pipery-tooling..."
          - apt-get update && apt-get install -y python3 python3-pip
          - pip install --quiet pipery-tooling
          - |
            pipery-tooling sast \
              --project-path ${PROJECT_PATH:-.} \
              --config ${CONFIG_FILE:-.pipery/config.yaml} \
              --log-file ${LOG_FILE:-pipery.jsonl}
          - echo "SAST scan complete"
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &sca-scan
        name: SCA Dependency Scan
        image: gcc:latest
        script:
          - echo "Running SCA scan using pipery-tooling..."
          - apt-get update && apt-get install -y python3 python3-pip
          - pip install --quiet pipery-tooling
          - |
            pipery-tooling sca \
              --project-path ${PROJECT_PATH:-.} \
              --config ${CONFIG_FILE:-.pipery/config.yaml} \
              --log-file ${LOG_FILE:-pipery.jsonl}
          - echo "SCA scan complete"
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &lint-step
        name: Code Quality Linting
        image: gcc:latest
        script:
          - echo "Installing cppcheck..."
          - apt-get update && apt-get install -y cppcheck
          - cd ${PROJECT_PATH:-.}
          - echo "Running cppcheck..."
          - cppcheck . --enable=all || true
          - echo "Lint stage complete"

    - step: &build-step
        name: Build C/C++ Project
        image: gcc:latest
        script:
          - echo "Installing build dependencies..."
          - apt-get update && apt-get install -y cmake make
          - cd ${PROJECT_PATH:-.}
          - mkdir -p build && cd build
          - |
            if [ "$BUILD_SYSTEM" = "cmake" ] || [ "$BUILD_SYSTEM" = "auto" ]; then
              cmake $CMAKE_FLAGS ..
              make
            elif [ "$BUILD_SYSTEM" = "make" ]; then
              make
            elif [ "$BUILD_SYSTEM" = "meson" ]; then
              meson setup builddir
              meson compile -C builddir
            fi
          - echo "Build complete"
        artifacts:
          - build/**

    - step: &test-step
        name: Execute Unit Tests
        image: gcc:latest
        script:
          - echo "Running C/C++ tests..."
          - cd ${PROJECT_PATH:-.}/build
          - |
            if [ -f "CTestConfig.cmake" ] || [ -d "CMakeFiles" ]; then
              ctest --verbose
            else
              echo "No test framework detected"
            fi
          - echo "Tests complete"
        artifacts:
          - build/Testing/**

    - step: &versioning-step
        name: Version Bump & Tag
        image: gcc:latest
        script:
          - echo "Running versioning step..."
          - apt-get update && apt-get install -y python3 python3-pip
          - pip install --quiet pipery-tooling
          - |
            pipery-tooling version \
              --project-path ${PROJECT_PATH:-.} \
              --version-bump ${VERSION_BUMP:-patch} \
              --log-file ${LOG_FILE:-pipery.jsonl}
          - |
            if [ -f "${PROJECT_PATH:-.}/version.txt" ]; then
              cat ${PROJECT_PATH:-.}/version.txt > version_info.txt
            else
              echo "v1.0.0" > version_info.txt
            fi
          - cat version_info.txt
        artifacts:
          - version_info.txt
          - ${LOG_FILE:-pipery.jsonl}

    - step: &packaging-step
        name: Package Artifacts
        image: gcc:latest
        script:
          - echo "Packaging C/C++ artifacts..."
          - cd ${PROJECT_PATH:-.}/build
          - tar -czf artifacts.tar.gz .
          - ls -la artifacts.tar.gz
          - echo "Package complete"
        artifacts:
          - build/artifacts.tar.gz

    - step: &release-step
        name: Release Artifacts
        image: alpine:latest
        trigger: manual
        script:
          - echo "Release artifacts available as build artifacts"
          - echo "Artifacts can be manually deployed or integrated with CD pipeline"
          - echo "Release complete"

    - step: &reintegration-step
        name: Reintegration to Target Branch
        image: alpine:latest
        trigger: manual
        script:
          - echo "Reintegration step would update target branch..."
          - |
            if [ -z "$GITHUB_TOKEN" ]; then
              echo "Skipping reintegration: GITHUB_TOKEN not set"
              exit 0
            fi
          - echo "Reintegration complete"

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Collecting logs and artifacts..."
          - |
            if [ -f "${LOG_FILE:-pipery.jsonl}" ]; then
              echo "Log file size: $(wc -c < ${LOG_FILE:-pipery.jsonl}) bytes"
            fi
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}
          - version_info.txt

variables:
  # Build Configuration
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  BUILD_SYSTEM: "auto"  # auto, cmake, make, meson
  COMPILER: "g++"
  CMAKE_FLAGS: ""

  # Feature Flags
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"

  # Release Configuration
  VERSION_BUMP: "patch"

  # Logging & Tracking
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - parallel:
        - step: *sast-scan
        - step: *sca-scan
    - step:
        <<: *lint-step
        condition:
          variable:
            - SKIP_LINT = "false"
        optional: true
    - step:
        <<: *build-step
        condition:
          variable:
            - SKIP_BUILD = "false"
    - step:
        <<: *test-step
        condition:
          variable:
            - SKIP_TEST = "false"
        optional: true
    - step:
        <<: *versioning-step
        condition:
          variable:
            - SKIP_VERSIONING = "false"
    - step:
        <<: *packaging-step
        condition:
          variable:
            - SKIP_PACKAGING = "false"
    - step: *logs-step

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *packaging-step
          condition:
            variable:
              - SKIP_PACKAGING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step: *logs-step

  custom:
    release:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *packaging-step
          condition:
            variable:
              - SKIP_PACKAGING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step
