# GitLab CI Pipeline for pipery-cpp-ci
# C/C++ compilation, testing, and packaging

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".github/pipery/config.yaml"
  BUILD_SYSTEM: "auto"  # auto, cmake, make, meson
  COMPILER: "g++"
  CMAKE_FLAGS: ""
  TESTS_PATH: ""
  VERSION_BUMP: "patch"
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"
  GITHUB_TOKEN: ""

stages:
  - checkout
  - setup
  - sast
  - sca
  - lint
  - build
  - test
  - versioning
  - packaging
  - release
  - reintegration
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository checked out"

setup:
  stage: setup
  image: gcc:latest
  script:
    - gcc --version
    - g++ --version
    - cmake --version || echo "cmake not installed"
    - apt-get update && apt-get install -y cmake make
  artifacts:
    expire_in: 1 day

sast_scan:
  stage: sast
  image: gcc:latest
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install pipery-tooling
  script:
    - echo "Running C/C++ SAST scan..."
    - pipery-tooling sast --project-path $PROJECT_PATH --config $CONFIG_FILE --log-file $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SAST == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

sca_scan:
  stage: sca
  image: gcc:latest
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install pipery-tooling
  script:
    - echo "Running C/C++ SCA scan..."
    - pipery-tooling sca --project-path $PROJECT_PATH --config $CONFIG_FILE --log-file $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SCA == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

lint:
  stage: lint
  image: gcc:latest
  before_script:
    - apt-get update && apt-get install -y cppcheck
  script:
    - cd $PROJECT_PATH
    - cppcheck . --enable=all || true
  allow_failure: true
  rules:
    - if: '$SKIP_LINT == "true"'
      when: never
    - when: on_success

build:
  stage: build
  image: gcc:latest
  dependencies:
    - setup
  before_script:
    - apt-get update && apt-get install -y cmake make
  script:
    - cd $PROJECT_PATH
    - mkdir -p build && cd build
    - |
      if [ "$BUILD_SYSTEM" = "cmake" ] || [ "$BUILD_SYSTEM" = "auto" ]; then
        cmake $CMAKE_FLAGS ..
        make
      elif [ "$BUILD_SYSTEM" = "make" ]; then
        make
      elif [ "$BUILD_SYSTEM" = "meson" ]; then
        meson setup builddir
        meson compile -C builddir
      fi
    - echo "Build complete"
  rules:
    - if: '$SKIP_BUILD == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $PROJECT_PATH/build/
    expire_in: 1 day

test:
  stage: test
  image: gcc:latest
  dependencies:
    - build
  script:
    - cd $PROJECT_PATH/build
    - |
      if [ -f "CTestConfig.cmake" ] || [ -d "CMakeFiles" ]; then
        ctest --verbose
      else
        echo "No test framework detected"
      fi
  rules:
    - if: '$SKIP_TEST == "true"'
      when: never
    - when: on_success
  allow_failure: true
  artifacts:
    paths:
      - $PROJECT_PATH/build/Testing/
    expire_in: 30 days

versioning:
  stage: versioning
  image: gcc:latest
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install pipery-tooling
  script:
    - echo "Running versioning step..."
    - pipery-tooling version --project-path $PROJECT_PATH --version-bump $VERSION_BUMP --log-file $LOG_FILE
    - |
      if [ -f "$PROJECT_PATH/version.txt" ]; then
        cat $PROJECT_PATH/version.txt > version_info.txt
      else
        echo "v1.0.0" > version_info.txt
      fi
  artifacts:
    paths:
      - version_info.txt
      - $LOG_FILE
    expire_in: 30 days
  rules:
    - if: '$SKIP_VERSIONING == "true"'
      when: never
    - when: on_success

packaging:
  stage: packaging
  image: gcc:latest
  dependencies:
    - build
  script:
    - cd $PROJECT_PATH/build
    - echo "Packaging C/C++ artifacts..."
    - tar -czf artifacts.tar.gz .
    - ls -la artifacts.tar.gz
  rules:
    - if: '$SKIP_PACKAGING == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $PROJECT_PATH/build/artifacts.tar.gz
    expire_in: 30 days

release:
  stage: release
  image: alpine:latest
  script:
    - echo "Release artifacts available as build artifacts"
  rules:
    - if: '$SKIP_RELEASE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual

reintegration:
  stage: reintegration
  image: alpine:latest
  script:
    - |
      [ -z "$GITHUB_TOKEN" ] && exit 0
      echo "Reintegration would update target branch"
  rules:
    - if: '$SKIP_REINTEGRATION == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "C/C++ pipeline complete"
  artifacts:
    paths:
      - $LOG_FILE
      - version_info.txt
    expire_in: 90 days
  when: always
